    <script>
        window.SpiderFleet = window.SpiderFleet || {};

        window.SpiderFleet.registerScrollListener = function (dotNetRef) {
            if (window._spiderScrollHandler) {
                window.removeEventListener('scroll', window._spiderScrollHandler, { passive: true });
            }
            window._spiderScrollHandler = function () {
                dotNetRef.invokeMethodAsync('OnScrollChanged', window.scrollY);
            };
            window.addEventListener('scroll', window._spiderScrollHandler, { passive: true });
            window._spiderScrollHandler();
        };
    </script>

    <script>
        function scrollPricing(direction) {
            const container = document.getElementById('pricing-carousel');
            if (container) {
                const scrollAmount = container.clientWidth * 0.8;
                container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
            }
        }

        window.initializeCarouselDrag = function () {
            const carousel = document.getElementById('pricing-carousel');
            if (!carousel) return;

            let isDown = false;
            let startX;
            let scrollLeft;

            const newCarousel = carousel.cloneNode(true);
            carousel.parentNode.replaceChild(newCarousel, carousel);

            newCarousel.addEventListener('mousedown', (e) => {
                isDown = true;
                newCarousel.classList.add('cursor-grabbing');
                newCarousel.classList.remove('cursor-grab');
                startX = e.pageX - newCarousel.offsetLeft;
                scrollLeft = newCarousel.scrollLeft;
            });
            newCarousel.addEventListener('mouseleave', () => {
                isDown = false;
                newCarousel.classList.remove('cursor-grabbing');
                newCarousel.classList.add('cursor-grab');
            });
            newCarousel.addEventListener('mouseup', () => {
                isDown = false;
                newCarousel.classList.remove('cursor-grabbing');
                newCarousel.classList.add('cursor-grab');
            });
            newCarousel.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - newCarousel.offsetLeft;
                const walk = (x - startX) * 2;
                newCarousel.scrollLeft = scrollLeft - walk;
            });
        };

        window.initializeScrollAnimations = function () {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const el = entry.target;
                    if (entry.isIntersecting) {
                        el.classList.add('is-visible');
                    } else {
                        el.classList.remove('is-visible');
                    }
                });
            }, observerOptions);

            const scrollElements = document.querySelectorAll('.scroll-animate');
            scrollElements.forEach(el => observer.observe(el));
        };

        window.handleBackToTopVisibility = function () {
            const backToTopBtn = document.getElementById('back-to-top');
            if (!backToTopBtn) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
                    backToTopBtn.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                } else {
                    backToTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');
                    backToTopBtn.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                }
            });
        };
    </script>
    <script>
        window.initVideoAutoplay = function (id) {
            var video = document.getElementById(id);
            if (!video) return;

            video.muted = true;
            video.playsInline = true;

            var attemptPlay = function () {
                var promise = video.play();
                if (promise !== undefined) {
                    promise.catch(function () {
                        // iOS blocked it — wait for first finger touch
                        var unlockOnTouch = function () {
                            video.play().catch(function (e) { console.warn('Video blocked:', e); });
                            document.removeEventListener('touchstart', unlockOnTouch);
                            document.removeEventListener('click', unlockOnTouch);
                        };
                        document.addEventListener('touchstart', unlockOnTouch, { once: true });
                        document.addEventListener('click', unlockOnTouch, { once: true });
                    });
                }
            };
            attemptPlay();
        };

        window.restartVideo = function (id) {
            var video = document.getElementById(id);
            if (video) {
                video.currentTime = 0;
                video.muted = true;
                video.play().catch(function (e) { console.warn('Restart blocked:', e); });
            }
        };
    </script>
